<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PMSP SYSTEM - ระบบซ่อมบำรุง</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* ป้องกันการเลื่อนจอซ้อนกัน */
      background-color: #f4f7f6;
    }
    .iframe-container {
      position: absolute;
      top: -45px; /* 🎯 พระเอกของเรา: ดันป้ายเตือนของ Google ทะลุขอบจอขึ้นไป 45px */
      left: 0;
      width: 100%;
      height: calc(100% + 45px); /* ชดเชยความสูงที่โดนดันขึ้นไป */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbyLXBgyLp7Il9fdBCm1SjMtIH5V8tyDaQeLxfHBw944xAWNBrgeTphev2V9If-QsAwhIQ/exec"></iframe>
  </div>
</body>
</html>
